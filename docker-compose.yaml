services:
  database:
    image: 'postgres:16'
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./dump:/dump
    networks:
      - postgres-network
    environment:
      POSTGRES_USER: luh
      POSTGRES_PASSWORD: sql
      POSTGRES_DB: site_data

networks: 
  postgres-network:
    driver: bridge

volumes:
  db-data:
    driver: local